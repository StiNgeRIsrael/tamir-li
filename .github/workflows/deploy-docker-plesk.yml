# Deploy full Docker stack on Plesk via SSH (docker compose up -d --build).
# Requires .env.docker on the server — see docs/docker-plesk-deploy.md

name: Deploy Docker stack to Plesk

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - '.env.docker.example'
      - '.github/workflows/deploy-docker-plesk.yml'

permissions:
  contents: read

concurrency:
  group: plesk-docker-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Production uses the Node monolith (deploy-plesk.yml). Skip unless Docker stack is configured.
    if: vars.PLESK_DOCKER_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PLESK_SSH_HOST || secrets.PLESK_FTP_HOST }}
          username: ${{ secrets.PLESK_SSH_USER || secrets.PLESK_FTP_USER }}
          password: ${{ secrets.PLESK_SSH_PASSWORD || secrets.PLESK_FTP_PASSWORD }}
          port: ${{ vars.PLESK_SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            DEPLOY_DIR="${{ vars.PLESK_DOCKER_DIR || '~/tamir-li' }}"
            DEPLOY_DIR="${DEPLOY_DIR/#\~/$HOME}"
            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "::error:: Docker deploy dir missing: $DEPLOY_DIR — set repo var PLESK_DOCKER_DIR or create the directory on the server (see docs/docker-plesk-deploy.md)"
              exit 1
            fi
            cd "$DEPLOY_DIR"
            if [ ! -f .env.docker ]; then
              echo "Missing .env.docker in $DEPLOY_DIR — create from .env.docker.example on the server"
              exit 1
            fi
            git pull origin main
            docker compose --env-file .env.docker up -d --build
            docker compose ps
