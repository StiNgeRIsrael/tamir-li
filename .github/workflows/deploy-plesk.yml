# Deploy monolith (frontend dist/ + backend) to Plesk Node.js via SFTP.
# See docs/plesk-node-deploy.md for Plesk settings and secrets.

name: Deploy to Plesk

on:
  workflow_dispatch:
    inputs:
      run_server_setup:
        description: Run npm run setup on server (lockfile or migrations changed)
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: plesk-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production app (Vite + backend)
        env:
          VITE_SITE_ORIGIN: ${{ vars.VITE_SITE_ORIGIN || 'https://tamir.li' }}
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://tamir.li' }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GTM_ID: ${{ secrets.VITE_GTM_ID }}
          VITE_ADSTERRA_ZONE_BANNER: ${{ secrets.VITE_ADSTERRA_ZONE_BANNER }}
          VITE_ADSTERRA_ZONE_SIDEBAR: ${{ secrets.VITE_ADSTERRA_ZONE_SIDEBAR }}
          VITE_ADSTERRA_ZONE_SIDEBAR_2: ${{ secrets.VITE_ADSTERRA_ZONE_SIDEBAR_2 }}
          VITE_ADSTERRA_ZONE_INLINE: ${{ secrets.VITE_ADSTERRA_ZONE_INLINE }}
          VITE_ADSTERRA_POPUNDER_SCRIPT_URL: ${{ secrets.VITE_ADSTERRA_POPUNDER_SCRIPT_URL }}
          VITE_ADSTERRA_NATIVE_SCRIPT_URL: ${{ secrets.VITE_ADSTERRA_NATIVE_SCRIPT_URL }}
          VITE_ADSTERRA_NATIVE_CONTAINER_ID: ${{ secrets.VITE_ADSTERRA_NATIVE_CONTAINER_ID }}
          VITE_ADSTERRA_INVOKE_HOST: ${{ secrets.VITE_ADSTERRA_INVOKE_HOST }}
        run: |
          npm run build
          test -f dist/sitemap.xml
          test -f dist/robots.txt
          SITEMAP_BYTES=$(wc -c < dist/sitemap.xml | tr -d ' ')
          echo "dist/sitemap.xml: ${SITEMAP_BYTES} bytes"
          test "$SITEMAP_BYTES" -gt 100000

      - name: Prepare deploy bundle
        run: |
          rm -rf plesk-upload
          mkdir -p plesk-upload/deploy/backend
          cp package.json package-lock.json app.js plesk-upload/deploy/
          cp -r dist plesk-upload/deploy/
          cp -r backend/dist plesk-upload/deploy/backend/
          cp -r backend/prisma plesk-upload/deploy/backend/
          cp backend/package.json backend/package-lock.json plesk-upload/deploy/backend/
          mkdir -p plesk-upload/deploy/scripts
          cp scripts/plesk-db.mjs plesk-upload/deploy/scripts/
          for f in sitemap.xml robots.txt ads.txt llms.txt; do
            if [ -f "dist/$f" ]; then
              cp "dist/$f" "plesk-upload/$f"
            fi
          done
          # Apache SPA .htaccess breaks the Node monolith when Plesk document root is deploy/dist:
          # /api/* and /health get rewritten to index.html instead of reaching Express.
          rm -f plesk-upload/deploy/dist/.htaccess
          echo "Plesk upload tree:"
          find plesk-upload -maxdepth 3 -type f | head -50
          test -f plesk-upload/deploy/package.json
          test -f plesk-upload/deploy/app.js
          test -f plesk-upload/deploy/backend/dist/index.js
          test -f plesk-upload/deploy/scripts/plesk-db.mjs
          test -f plesk-upload/deploy/dist/sitemap.xml
          test -f plesk-upload/sitemap.xml
          SITEMAP_BYTES=$(wc -c < plesk-upload/sitemap.xml | tr -d ' ')
          echo "plesk-upload/sitemap.xml: ${SITEMAP_BYTES} bytes"
          test "$SITEMAP_BYTES" -gt 100000

      - name: Deploy to Plesk (Node app + SEO files)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.PLESK_SSH_HOST || secrets.PLESK_FTP_HOST }}
          username: ${{ secrets.PLESK_SSH_USER || secrets.PLESK_FTP_USER }}
          password: ${{ secrets.PLESK_SSH_PASSWORD || secrets.PLESK_FTP_PASSWORD }}
          port: ${{ vars.PLESK_SSH_PORT || 22 }}
          local_path: ./plesk-upload/
          # SEO files → httpdocs/sitemap.xml; Node monolith → httpdocs/deploy/
          remote_path: ${{ vars.PLESK_HTTPDOCS_DIR || vars.PLESK_SSH_SERVER_DIR || 'httpdocs/' }}
          sftp_only: false
          rsyncArgs: "-avz --omit-dir-times"
          sftpArgs: "-o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new"

      # SSH sessions do not inherit Plesk Node.js custom env — export GitHub secrets when run_server_setup=true.
      - name: Validate server setup secrets
        if: success() && github.event_name == 'workflow_dispatch' && github.event.inputs.run_server_setup == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error:: run_server_setup=true requires GitHub repository secret DATABASE_URL. SSH does not inherit Plesk Node.js custom env vars. Add DATABASE_URL under Settings → Secrets and variables → Actions, or run setup via Plesk UI: Node.js → Run Node.js commands → run setup"
            exit 1
          fi

      # Runs only after SFTP succeeds. No npm install unless workflow_dispatch run_server_setup=true.
      - name: Restart Node.js app on Plesk
        if: success()
        uses: appleboy/ssh-action@v1.2.0
        env:
          RUN_SERVER_SETUP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_server_setup == 'true' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
          NODE_ENV: production
        with:
          host: ${{ secrets.PLESK_SSH_HOST || secrets.PLESK_FTP_HOST }}
          username: ${{ secrets.PLESK_SSH_USER || secrets.PLESK_FTP_USER }}
          password: ${{ secrets.PLESK_SSH_PASSWORD || secrets.PLESK_FTP_PASSWORD }}
          port: ${{ vars.PLESK_SSH_PORT || 22 }}
          command_timeout: 15m
          envs: RUN_SERVER_SETUP,DATABASE_URL,JWT_SECRET,GOOGLE_CLIENT_ID,NODE_ENV
          script: |
            set -e
            APP_DIR="${{ vars.PLESK_NODE_APP_DIR || 'httpdocs/deploy' }}"
            APP_DIR="${APP_DIR%/}"
            DOMAIN="${{ vars.PLESK_DOMAIN || 'tamir.li' }}"
            cd "$APP_DIR" || { echo "Cannot cd to $APP_DIR"; exit 1; }
            # Normalize to absolute path — relative APP_DIR breaks cleanup/verify after cd.
            APP_DIR="$(pwd)"
            echo "Node.js app dir: $APP_DIR"

            # Backend deps + prisma generate — no DATABASE_URL required (unlike plesk:db / migrate).
            echo "Running npm run plesk:backend-install (ensure Prisma client after deploy)..."
            export PATH="/opt/plesk/node/22/bin:/opt/plesk/node/24/bin:/opt/plesk/node/20/bin:$PATH"
            npm run plesk:backend-install

            if [ "$RUN_SERVER_SETUP" = "true" ]; then
              if [ -z "$DATABASE_URL" ]; then
                echo "::error:: DATABASE_URL is not set. Add GitHub secret DATABASE_URL or run setup via Plesk UI: Node.js → Run Node.js commands → run setup"
                exit 1
              fi
              echo "Running npm run setup (workflow_dispatch run_server_setup=true)..."
              export DATABASE_URL NODE_ENV=production
              [ -n "$JWT_SECRET" ] && export JWT_SECRET
              [ -n "$GOOGLE_CLIENT_ID" ] && export GOOGLE_CLIENT_ID
              npm run setup
            fi

            RESTARTED=0

            # 1) Plesk Node extension CLI (not available on all Plesk versions)
            if command -v plesk >/dev/null 2>&1; then
              if plesk bin node --restart -domain "$DOMAIN" 2>/dev/null; then
                echo "Restarted via: plesk bin node --restart -domain $DOMAIN"
                RESTARTED=1
              else
                echo "Note: plesk bin node --restart not available (common — using Passenger touch fallback)"
              fi
            fi

            if [ "$RESTARTED" -eq 0 ]; then
              # 2) Phusion Passenger / Plesk GUI "Restart app" uses tmp/restart.txt
              mkdir -p tmp
              touch tmp/restart.txt
              echo "Triggered restart via: touch tmp/restart.txt"

              # 3) Touch startup file (fallback for some Node.js configs)
              touch app.js
              echo "Also touched: app.js"
            fi

            echo "Node.js restart signal sent. App reloads on the next request (Passenger may take a few seconds)."

            # Legacy static files in httpdocs/ (parent of deploy/) take precedence over the Node proxy.
            # Remove them so /, /api/*, and /health reach the monolith in httpdocs/deploy/.
            HTTPDOCS="$(dirname "$APP_DIR")"
            if [ -f "$HTTPDOCS/.htaccess" ]; then
              echo "Removing legacy httpdocs/.htaccess (Apache SPA rewrite intercepts /api/* and /health)..."
              rm -f "$HTTPDOCS/.htaccess"
            fi
            if [ -f "$HTTPDOCS/index.html" ]; then
              echo "Removing legacy static index.html from $HTTPDOCS (Node monolith should serve the SPA)..."
              rm -f "$HTTPDOCS/index.html"
            fi
            if [ -d "$HTTPDOCS/assets" ]; then
              echo "Removing legacy static assets/ from $HTTPDOCS..."
              rm -rf "$HTTPDOCS/assets"
            fi
            if [ -d "$HTTPDOCS/dist" ]; then
              echo "Removing legacy httpdocs/dist/ (old full static deploy)..."
              rm -rf "$HTTPDOCS/dist"
            fi
            for legacy in registerSW.js sw.js workbox-*.js manifest.webmanifest; do
              rm -f "$HTTPDOCS/$legacy" 2>/dev/null || true
            done

            # dist/.htaccess (legacy Apache SPA) must not intercept /api/* when docroot is deploy/dist.
            if [ -f "$APP_DIR/dist/.htaccess" ]; then
              echo "Removing dist/.htaccess from $APP_DIR/dist (Node monolith serves SPA fallback)..."
              rm -f "$APP_DIR/dist/.htaccess"
            fi

            echo "Deploy layout (expected: app.js + dist/index.html + backend/dist/index.js):"
            for f in app.js dist/index.html backend/dist/index.js; do
              if [ ! -f "$f" ]; then
                echo "::error:: Missing $f in $APP_DIR"
                ls -la "$(dirname "$f")" 2>/dev/null || true
                exit 1
              fi
              ls -la "$f"
            done

      - name: Verify Node monolith is live
        if: success()
        run: |
          sleep 15
          HEALTH_CT=$(curl -sS -o /tmp/health-body -w '%{content_type}' https://tamir.li/health || echo "failed")
          if echo "$HEALTH_CT" | grep -qi 'text/html'; then
            echo "::error:: GET /health returned HTML (expected application/json). Legacy static layer or Node proxy misconfigured — see docs/plesk-node-deploy.md#fix-static-layer-blocking-node"
            head -c 200 /tmp/health-body || true
            exit 1
          fi
          echo "/health content-type: $HEALTH_CT"
          cat /tmp/health-body
          if grep -q '"ok"[[:space:]]*:[[:space:]]*false' /tmp/health-body; then
            echo "::warning:: GET /health reports db.ok=false — check DATABASE_URL in Plesk custom env and Restart app (startup-migrate applies migrations; do not use run plesk:db in Plesk UI)."
          fi
