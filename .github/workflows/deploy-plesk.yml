# Deploy monolith (frontend dist/ + backend) to Plesk Node.js via SFTP.
# See docs/plesk-node-deploy.md for Plesk settings and secrets.

name: Deploy to Plesk

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: plesk-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production app (Vite + backend)
        env:
          VITE_SITE_ORIGIN: ${{ vars.VITE_SITE_ORIGIN || 'https://tamir.li' }}
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://tamir.li' }}
          VITE_GTM_ID: ${{ secrets.VITE_GTM_ID }}
          VITE_ADSENSE_CLIENT: ${{ secrets.VITE_ADSENSE_CLIENT }}
          VITE_ADSENSE_SLOT_BANNER: ${{ secrets.VITE_ADSENSE_SLOT_BANNER }}
          VITE_ADSENSE_SLOT_SIDEBAR: ${{ secrets.VITE_ADSENSE_SLOT_SIDEBAR }}
          VITE_ADSENSE_SLOT_INLINE: ${{ secrets.VITE_ADSENSE_SLOT_INLINE }}
        run: |
          npm run build
          test -f dist/sitemap.xml
          test -f dist/robots.txt

      - name: Prepare deploy bundle
        run: |
          rm -rf deploy
          mkdir -p deploy/backend
          cp package.json package-lock.json app.js deploy/
          cp -r dist deploy/
          cp -r backend/dist deploy/backend/
          cp -r backend/prisma deploy/backend/
          cp backend/package.json backend/package-lock.json deploy/backend/
          echo "Deploy bundle contents:"
          find deploy -maxdepth 3 -type f | head -40
          test -f deploy/package.json
          test -f deploy/app.js
          test -f deploy/backend/package.json
          test -f deploy/backend/dist/index.js
          test -d deploy/dist
          test -f deploy/dist/sitemap.xml
          test -f deploy/dist/robots.txt
          test -d deploy/backend/dist
          test -d deploy/backend/prisma

      - name: Prepare SEO files for document root
        run: |
          mkdir -p deploy-seo
          for f in sitemap.xml robots.txt ads.txt llms.txt; do
            if [ -f "dist/$f" ]; then
              cp "dist/$f" "deploy-seo/$f"
            fi
          done
          ls -la deploy-seo/
          test -f deploy-seo/sitemap.xml

      - name: Deploy to Plesk Node.js app root (SFTP)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.PLESK_SSH_HOST || secrets.PLESK_FTP_HOST }}
          username: ${{ secrets.PLESK_SSH_USER || secrets.PLESK_FTP_USER }}
          password: ${{ secrets.PLESK_SSH_PASSWORD || secrets.PLESK_FTP_PASSWORD }}
          port: ${{ vars.PLESK_SSH_PORT || 22 }}
          local_path: ./deploy/
          # Node.js application root — NOT the static httpdocs document root.
          # Default: httpdocs/deploy/ (sibling to legacy static files in httpdocs/).
          remote_path: ${{ vars.PLESK_NODE_APP_DIR || 'httpdocs/deploy/' }}
          sftp_only: true
          sftpArgs: "-o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new"

      - name: Deploy SEO files to Plesk document root (SFTP)
        env:
          SFTP_HOST: ${{ secrets.PLESK_SSH_HOST || secrets.PLESK_FTP_HOST }}
          SFTP_USER: ${{ secrets.PLESK_SSH_USER || secrets.PLESK_FTP_USER }}
          SFTP_PASS: ${{ secrets.PLESK_SSH_PASSWORD || secrets.PLESK_FTP_PASSWORD }}
          SFTP_PORT: ${{ vars.PLESK_SSH_PORT || 22 }}
          SFTP_DIR: ${{ vars.PLESK_HTTPDOCS_DIR || 'httpdocs' }}
        run: |
          sudo apt-get install -y sshpass
          httpdocs="${SFTP_DIR%/}"
          batch=$(mktemp)
          for f in deploy-seo/*; do
            [ -f "$f" ] || continue
            echo "put $f ${httpdocs}/$(basename "$f")" >> "$batch"
          done
          cat "$batch"
          sshpass -p "$SFTP_PASS" sftp -o StrictHostKeyChecking=accept-new -P "$SFTP_PORT" -b "$batch" "$SFTP_USER@$SFTP_HOST"
