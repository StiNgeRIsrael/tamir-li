# Deploy monolith (frontend dist/ + backend) to Plesk Node.js via SFTP.
# See docs/plesk-node-deploy.md for Plesk settings and secrets.

name: Deploy to Plesk

on:
  workflow_dispatch:
    inputs:
      run_server_setup:
        description: Run npm run setup on server (lockfile or migrations changed)
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: plesk-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production app (Vite + backend)
        env:
          VITE_SITE_ORIGIN: ${{ vars.VITE_SITE_ORIGIN || 'https://tamir.li' }}
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://tamir.li' }}
          VITE_GTM_ID: ${{ secrets.VITE_GTM_ID }}
          VITE_ADSTERRA_ZONE_BANNER: ${{ secrets.VITE_ADSTERRA_ZONE_BANNER }}
          VITE_ADSTERRA_ZONE_SIDEBAR: ${{ secrets.VITE_ADSTERRA_ZONE_SIDEBAR }}
          VITE_ADSTERRA_ZONE_SIDEBAR_2: ${{ secrets.VITE_ADSTERRA_ZONE_SIDEBAR_2 }}
          VITE_ADSTERRA_ZONE_INLINE: ${{ secrets.VITE_ADSTERRA_ZONE_INLINE }}
          VITE_ADSTERRA_POPUNDER_SCRIPT_URL: ${{ secrets.VITE_ADSTERRA_POPUNDER_SCRIPT_URL }}
          VITE_ADSTERRA_INVOKE_HOST: ${{ secrets.VITE_ADSTERRA_INVOKE_HOST }}
        run: |
          npm run build
          test -f dist/sitemap.xml
          test -f dist/robots.txt
          SITEMAP_BYTES=$(wc -c < dist/sitemap.xml | tr -d ' ')
          echo "dist/sitemap.xml: ${SITEMAP_BYTES} bytes"
          test "$SITEMAP_BYTES" -gt 100000

      - name: Prepare deploy bundle
        run: |
          rm -rf plesk-upload
          mkdir -p plesk-upload/deploy/backend
          cp package.json package-lock.json app.js plesk-upload/deploy/
          cp -r dist plesk-upload/deploy/
          cp -r backend/dist plesk-upload/deploy/backend/
          cp -r backend/prisma plesk-upload/deploy/backend/
          cp backend/package.json backend/package-lock.json plesk-upload/deploy/backend/
          for f in sitemap.xml robots.txt ads.txt llms.txt; do
            if [ -f "dist/$f" ]; then
              cp "dist/$f" "plesk-upload/$f"
            fi
          done
          echo "Plesk upload tree:"
          find plesk-upload -maxdepth 3 -type f | head -50
          test -f plesk-upload/deploy/package.json
          test -f plesk-upload/deploy/app.js
          test -f plesk-upload/deploy/backend/dist/index.js
          test -f plesk-upload/deploy/dist/sitemap.xml
          test -f plesk-upload/sitemap.xml
          SITEMAP_BYTES=$(wc -c < plesk-upload/sitemap.xml | tr -d ' ')
          echo "plesk-upload/sitemap.xml: ${SITEMAP_BYTES} bytes"
          test "$SITEMAP_BYTES" -gt 100000

      - name: Deploy to Plesk (Node app + SEO files)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.PLESK_SSH_HOST || secrets.PLESK_FTP_HOST }}
          username: ${{ secrets.PLESK_SSH_USER || secrets.PLESK_FTP_USER }}
          password: ${{ secrets.PLESK_SSH_PASSWORD || secrets.PLESK_FTP_PASSWORD }}
          port: ${{ vars.PLESK_SSH_PORT || 22 }}
          local_path: ./plesk-upload/
          # SEO files → httpdocs/sitemap.xml; Node monolith → httpdocs/deploy/
          remote_path: ${{ vars.PLESK_HTTPDOCS_DIR || 'httpdocs/' }}
          sftp_only: false
          rsyncArgs: "-avz --omit-dir-times"
          sftpArgs: "-o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new"

      # Runs only after SFTP succeeds. No npm install unless workflow_dispatch run_server_setup=true.
      - name: Restart Node.js app on Plesk
        if: success()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PLESK_SSH_HOST || secrets.PLESK_FTP_HOST }}
          username: ${{ secrets.PLESK_SSH_USER || secrets.PLESK_FTP_USER }}
          password: ${{ secrets.PLESK_SSH_PASSWORD || secrets.PLESK_FTP_PASSWORD }}
          port: ${{ vars.PLESK_SSH_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -e
            APP_DIR="${{ vars.PLESK_NODE_APP_DIR || 'httpdocs/deploy' }}"
            APP_DIR="${APP_DIR%/}"
            DOMAIN="${{ vars.PLESK_DOMAIN || 'tamir.li' }}"
            cd "$APP_DIR"
            echo "Node.js app dir: $(pwd)"

            if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_server_setup == 'true' }}" = "true" ]; then
              echo "Running npm run setup (workflow_dispatch run_server_setup=true)..."
              export PATH="/opt/plesk/node/22/bin:/opt/plesk/node/24/bin:/opt/plesk/node/20/bin:$PATH"
              npm run setup
            fi

            RESTARTED=0

            # 1) Plesk Node extension CLI (not available on all Plesk versions)
            if command -v plesk >/dev/null 2>&1; then
              if plesk bin node --restart -domain "$DOMAIN" 2>/dev/null; then
                echo "Restarted via: plesk bin node --restart -domain $DOMAIN"
                RESTARTED=1
              else
                echo "Note: plesk bin node --restart not available (common — using Passenger touch fallback)"
              fi
            fi

            if [ "$RESTARTED" -eq 0 ]; then
              # 2) Phusion Passenger / Plesk GUI "Restart app" uses tmp/restart.txt
              mkdir -p tmp
              touch tmp/restart.txt
              echo "Triggered restart via: touch tmp/restart.txt"

              # 3) Touch startup file (fallback for some Node.js configs)
              touch app.js
              echo "Also touched: app.js"
            fi

            echo "Node.js restart signal sent. App reloads on the next request (Passenger may take a few seconds)."
