# Local MySQL only — for development (see docs/local-dev.md).
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tamirly_db
    volumes:
      - tamirly_mysql_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  tamirly_mysql_dev:
